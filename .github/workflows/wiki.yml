name: Build wiki image

on:
  push:
    branches: [master]
    paths:
      - apps/wiki/**
      - .github/workflows/wiki.yml
    paths-ignore:
      - apps/wiki/values.yaml
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  IMAGE: ghcr.io/kannguyenkiet/homeserver-wiki

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        id: build
        with:
          context: apps/wiki
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

      - name: Update Helm image tag
        run: |
          TAG="${{ github.sha }}"
          sed -i "s|^  tag:.*|  tag: \"${TAG}\"|" apps/wiki/values.yaml
          sed -i "s|^  pullPolicy:.*|  pullPolicy: IfNotPresent|" apps/wiki/values.yaml

      - name: Commit updated image tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/wiki/values.yaml
          if git diff --staged --quiet; then
            echo "Image tag already up to date"
            exit 0
          fi
          git commit -m "Update wiki image tag to ${GITHUB_SHA}"
          git push
