replicaCount: 1

image:
  repository: docker.gitea.com/gitea
  tag: "1.24.7"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  http:
    port: 3000
    targetPort: 3000
  ssh:
    port: 22
    targetPort: 22

ingress:
  enabled: true
  className: nginx
  annotations: {}
  host: git.huukiet.com
  path: /
  pathType: Prefix
  tls: []

persistence:
  enabled: true
  existingClaim: ""
  accessModes:
    - ReadWriteOnce
  size: 20Gi
  storageClass: ""

gitea:
  rootUrl: https://git.huukiet.com
  database:
    type: postgres
    # Native PostgreSQL running on the homeserver, outside Kubernetes.
    # Replace this with the server's reserved LAN IP or local DNS name.
    host: 192.168.1.10:5432
    existingSecret: gitea-secret
    secretKeys:
      name: DB_NAME
      user: DB_USER
      password: DB_PASS

externalSecret:
  enabled: true
  refreshInterval: 1h
  secretStore:
    name: vault-backend
    server: http://vault.vault.svc.cluster.local:8200
    path: kv
    version: v2
  auth:
    serviceAccountName: gitea-vault-auth
    mountPath: kubernetes
    role: gitea
    audiences:
      - vault
  remoteRef:
    key: homeserver/gitea

podSecurityContext:
  fsGroup: 1000

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}
