apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea
  namespace: gitea
spec:
  replicas: 1

  selector:
    matchLabels:
      app: gitea

  template:
    metadata:
      labels:
        app: gitea

    spec:
      securityContext:
        fsGroup: 1000

      containers:
        - name: gitea
          image: docker.gitea.com/gitea:1.24.7

          ports:
            - containerPort: 3000
            - containerPort: 22

          env:
            - name: GITEA__database__DB_TYPE
              value: postgres

            - name: GITEA__database__HOST
              valueFrom:
                configMapKeyRef:
                  name: gitea-config
                  key: DB_HOST

            - name: GITEA__database__NAME
              valueFrom:
                secretKeyRef:
                  name: gitea-secret
                  key: DB_NAME

            - name: GITEA__database__USER
              valueFrom:
                secretKeyRef:
                  name: gitea-secret
                  key: DB_USER

            - name: GITEA__database__PASSWD
              valueFrom:
                secretKeyRef:
                  name: gitea-secret
                  key: DB_PASS

            - name: GITEA__server__ROOT_URL
              valueFrom:
                configMapKeyRef:
                  name: gitea-config
                  key: ROOT_URL

          volumeMounts:
            - mountPath: /data
              name: data

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: gitea-data

