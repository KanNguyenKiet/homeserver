replicaCount: 1

image:
  repository: ghcr.io/gethomepage/homepage
  tag: latest
  pullPolicy: Always

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

rbac:
  create: true

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: true
  className: nginx
  annotations: {}
  host: home.huukiet.com
  path: /
  pathType: Prefix
  tls: []

allowedHosts:
  - home.huukiet.com

podSecurityContext: {}

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

probes:
  liveness:
    initialDelaySeconds: 5
    periodSeconds: 15
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 15

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

config:
  kubernetesYaml: |
    mode: cluster
  bookmarksYaml: |
    - Homelab:
        - Homeserver:
            - abbr: GH
              href: https://git.huukiet.com/huukiethk2804/homeserver
              description: Public homelab repository
  settingsYaml: |
    title: Kiet Home
    theme: dark
    color: slate
    fullWidth: true
    maxGroupColumns: 4
    hideVersion: true
    disableCollapse: true
    useEqualHeights: true
    iconStyle: theme
    background:
      image: https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&w=2560&q=80
      opacity: 30
    headerStyle: boxedWidgets
    statusStyle: dot
    target: _blank
    layout:
      Development:
        icon: mdi-code-braces
      Managed Services:
        icon: si-cloudflare
      Infrastructure:
        icon: mdi-server-network
      Homelab:
        icon: mdi-home-assistant
  servicesYaml: |
    - Development:
        - Gitea:
            icon: gitea.svg
            href: https://git.huukiet.com
            description: Git forge
        - Argo CD:
            icon: argocd.svg
            href: https://argocd.huukiet.com
            description: Continuous deployment
    - Managed Services:
        - Cloudflare:
            icon: si-cloudflare
            href: https://dash.cloudflare.com
            description: dash.cloudflare.com
        - Tailscale:
            icon: tailscale.svg
            href: https://login.tailscale.com/admin
            description: login.tailscale.com
    - Infrastructure:
        - Server:
            icon: mdi-kubernetes
            href: https://home.huukiet.com
            description: home.huukiet.com
  widgetsYaml: |
    - search:
        provider: google
        focus: false
        showSearchSuggestions: true
        target: _blank
  customCss: |
    body {
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
    }

    #page_wrapper {
      min-height: 100vh;
    }

    #page_container {
      backdrop-filter: none;
      background: transparent !important;
      max-width: 88rem;
      padding-top: 2rem;
      padding-bottom: 3rem;
    }

    #header {
      margin-bottom: 2.5rem;
    }

    #header h1 {
      font-size: 1.5rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      opacity: 0.9;
    }

    .service-group-name,
    .bookmark-group-name {
      font-size: 1.05rem;
      font-weight: 400;
      letter-spacing: 0.03em;
      opacity: 0.82;
      margin-bottom: 0.85rem;
    }

    .services-group,
    .bookmarks-group {
      gap: 0.65rem;
    }

    #widgets-wrap {
      width: 100%;
      max-width: 42rem;
      margin: 0 auto 2rem;
    }

    .search-widget {
      width: 100%;
    }

    .search-widget form {
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(15, 23, 42, 0.42);
      backdrop-filter: blur(14px);
      border-radius: 9999px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.18);
    }

    .service-card,
    .bookmark-card {
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(15, 23, 42, 0.42) !important;
      backdrop-filter: blur(14px);
      border-radius: 0.85rem;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.16);
    }

    .service-card:hover,
    .bookmark-card:hover {
      transform: translateY(-1px);
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
      border-color: rgba(255, 255, 255, 0.22);
      background: rgba(15, 23, 42, 0.52) !important;
    }

    .service-title,
    .bookmark-title {
      font-weight: 500;
    }

    .service-description,
    .bookmark-description {
      opacity: 0.72;
    }
  customJs: ""
  dockerYaml: ""
  proxmoxYaml: ""
