apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "wiki.fullname" . }}-content
  labels:
    {{- include "wiki.labels" . | nindent 4 }}
data:
{{ (.Files.Glob "files/*.html").AsConfig | indent 2 }}
{{ (.Files.Glob "files/*.css").AsConfig | indent 2 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "wiki.fullname" . }}-nginx
  labels:
    {{- include "wiki.labels" . | nindent 4 }}
data:
{{ (.Files.Glob "files/nginx/*").AsConfig | indent 2 }}
