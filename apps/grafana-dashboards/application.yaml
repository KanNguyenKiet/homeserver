apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-dashboards
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  sources:
    - repoURL: https://git.huukiet.com/ops/grafana-dashboard.git
      targetRevision: master
      ref: dashboards
    - repoURL: https://github.com/KanNguyenKiet/homeserver.git
      targetRevision: master
      path: apps/grafana-dashboards
      helm:
        releaseName: grafana-dashboards
        valueFiles:
          - values.yaml
        fileParameters:
          - name: dashboardFiles.homelabOverview
            path: $dashboards/homelab-overview.json
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
