apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitea-actions
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "15"
    argocd.argoproj.io/compare-options: ServerSideDiff=true
spec:
  project: default
  source:
    repoURL: https://github.com/KanNguyenKiet/homeserver.git
    targetRevision: master
    path: apps/gitea-actions
    helm:
      releaseName: gitea-actions
  destination:
    server: https://kubernetes.default.svc
    namespace: gitea
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      name: gitea-actions-runner
      jqPathExpressions:
        # DinD runs as a native sidecar initContainer on Kubernetes 1.29+.
        - .spec.template.spec.initContainers[]?.restartPolicy
        # The API server populates these on volumeClaimTemplates after apply.
        - .spec.volumeClaimTemplates[]?.apiVersion
        - .spec.volumeClaimTemplates[]?.kind
        - .spec.volumeClaimTemplates[]?.status
      jsonPointers:
        - /spec/persistentVolumeClaimRetentionPolicy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
