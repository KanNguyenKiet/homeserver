apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  url: https://argocd.huukiet.com
  # The bundled Dex issuer is reached through the internal Cloudflare/Ingress
  # route, whose origin certificate is not in the argocd-server trust store.
  oidc.tls.insecure.skip.verify: "true"
  dex.config: |
    connectors:
      - type: github
        id: github
        name: GitHub
        config:
          clientID: $argocd-github-oauth:clientID
          clientSecret: $argocd-github-oauth:clientSecret
          loadAllGroups: false
          useLoginAsID: false
