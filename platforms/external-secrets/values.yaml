external-secrets:
  installCRDs: true

  crds:
    annotations:
      argocd.argoproj.io/sync-options: ServerSideApply=true

  replicaCount: 1

  webhook:
    create: true
    replicaCount: 1

  certController:
    create: true
    replicaCount: 1

  leaderElect: true

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
